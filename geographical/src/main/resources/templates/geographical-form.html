<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Geographical Data</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
        }

        /* ---------- NAVBAR ---------- */

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: auto;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 1.3rem;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            opacity: 0.85;
            transition: 0.3s;
        }

        .navbar ul li a:hover {
            opacity: 1;
            color: #00e0ff;
        }

        /* ---------- FORM CONTAINER ---------- */

        .page {
            padding-top: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-card {
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(18px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .form-card h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* ---------- INPUTS ---------- */

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            opacity: 0.85;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            background: rgba(255,255,255,0.25);
        }

        /* ---------- BUTTON ---------- */

        .btn-submit {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: bold;
            background: #00e0ff;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            transform: scale(1.03);
        }

        /* ---------- SUCCESS MESSAGE ---------- */

        .success-msg {
            text-align: center;
            margin-bottom: 15px;
            color: #7CFFB2;
            font-size: 0.95rem;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar-inner">
        <div class="logo">🌍 GeoService</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/swagger-ui/index.html" target="_blank">API Docs</a></li>
        </ul>
    </div>
</nav>


<!-- FORM -->
<div class="page">
    <div class="form-card">

        <h2>📌 Add Geographical Data</h2>

        <!-- SUCCESS MESSAGE -->
        <div class="success-msg" th:if="${successMessage}">
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/geographical/add}" method="post">

            <div class="input-group">
                <label>User ID</label>
                <input type="number" name="userId" required>
            </div>

            <div class="input-group">
                <label>Latitude</label>
                <input type="text" name="latitude" required>
            </div>

            <div class="input-group">
                <label>Longitude</label>
                <input type="text" name="longitude" required>
            </div>

            <div class="input-group">
                <label>Status</label>
                <select name="status">
                    <option value="1">Active</option>
                    <option value="0">Inactive</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">
                Save Data
            </button>

        </form>

    </div>
</div>

</body>
</html>
